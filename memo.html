<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealLens — Investment Memo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #0f1424;
  --bg-card: #131a2e;
  --border: #1e2a45;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.12);
  --accent-dim: #2563eb;
  --amber: #f59e0b;
  --green: #10b981;
  --text-primary: #e8ecf4;
  --text-secondary: #8494b7;
  --text-muted: #4a5a7a;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(245,158,11,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 2; }

/* ---- HEADER ---- */
.header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 2.5rem;
  border-bottom: 1px solid var(--border);
  background: rgba(10,14,26,0.9);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo { display: flex; align-items: center; gap: 0.6rem; }

.logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 0.75rem; color: #fff;
}

.logo-text {
  font-family: 'Instrument Serif', serif;
  font-size: 1.4rem; color: var(--text-primary);
}

.logo-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; color: var(--amber);
  text-transform: uppercase; letter-spacing: 2px;
  margin-left: 0.5rem;
  padding: 0.2rem 0.5rem;
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 3px;
  background: rgba(245,158,11,0.06);
}

.header-actions { display: flex; align-items: center; gap: 0.75rem; }

.btn-header {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; padding: 0.45rem 1rem;
  border-radius: 5px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary);
  cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase;
  transition: all 0.2s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 0.4rem;
}

.btn-header:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

.btn-header.primary {
  background: var(--amber); border-color: var(--amber); color: #000; font-weight: 600;
}

.btn-header.primary:hover { background: #d97706; border-color: #d97706; box-shadow: 0 0 20px rgba(245,158,11,0.3); }

/* ---- LOADING SCREEN ---- */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 65px);
  gap: 1.5rem;
}

.loading-ring {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--amber);
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; color: var(--amber);
  letter-spacing: 1px; text-transform: uppercase;
}

.loading-sub { font-size: 0.85rem; color: var(--text-muted); }

/* ---- ERROR SCREEN ---- */
.error-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 65px);
  gap: 1rem;
  text-align: center;
  padding: 2rem;
}

.error-screen.visible { display: flex; }

.error-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.8rem; color: var(--text-primary);
}

.error-msg { font-size: 0.9rem; color: var(--text-secondary); max-width: 400px; line-height: 1.6; }

/* ---- MEMO SCREEN ---- */
.memo-screen {
  display: none;
  max-width: 860px;
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
}

.memo-screen.visible { display: block; }

/* Memo cover */
.memo-cover {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2.5rem;
  margin-bottom: 2.5rem;
  background: var(--bg-card);
  position: relative;
  overflow: hidden;
}

.memo-cover::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--amber), var(--accent));
}

.memo-doc-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--amber); margin-bottom: 0.75rem;
}

.memo-company-name {
  font-family: 'Instrument Serif', serif;
  font-size: 2.8rem; font-weight: 400;
  color: var(--text-primary); letter-spacing: -0.5px;
  margin-bottom: 0.5rem;
}

.memo-one-liner {
  font-size: 1rem; color: var(--text-secondary);
  line-height: 1.6; max-width: 600px; margin-bottom: 1.5rem;
}

.memo-meta {
  display: flex; gap: 2rem; flex-wrap: wrap;
}

.memo-meta-item { display: flex; flex-direction: column; gap: 0.2rem; }

.memo-meta-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-muted);
}

.memo-meta-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem; font-weight: 600; color: var(--text-primary);
}

.verdict-pill {
  display: inline-flex; align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 0.35rem 0.9rem; border-radius: 5px; border: 1.5px solid;
}

.verdict-pass { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,0.08); }
.verdict-explore { color: var(--amber); border-color: var(--amber); background: rgba(245,158,11,0.08); }
.verdict-fast { color: var(--green); border-color: var(--green); background: rgba(16,185,129,0.08); }

/* Memo body (Claude HTML output) */
.memo-body {
  font-size: 0.95rem;
  line-height: 1.8;
  color: var(--text-secondary);
}

.memo-body h2 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.5rem; font-weight: 400;
  color: var(--text-primary);
  margin: 2.5rem 0 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--border);
  letter-spacing: -0.2px;
}

.memo-body h2:first-child { margin-top: 0; }

.memo-body h3 {
  font-size: 1rem; font-weight: 600;
  color: var(--text-primary);
  margin: 1.25rem 0 0.5rem;
}

.memo-body p { margin-bottom: 0.9rem; }
.memo-body p:last-child { margin-bottom: 0; }

.memo-body ul, .memo-body ol {
  padding-left: 1.5rem; margin-bottom: 0.9rem;
}

.memo-body li { margin-bottom: 0.35rem; }

.memo-body strong { color: var(--text-primary); font-weight: 600; }

/* ---- PRINT ---- */
@media print {
  body { background: #fff; color: #111; }
  body::before { display: none; }
  .header-bar { display: none; }
  .memo-cover { background: #f8f9fa; border-color: #ddd; }
  .memo-cover::before { display: none; }
  .memo-company-name, .memo-body h2, .memo-body strong { color: #111; }
  .memo-body { color: #333; }
  .memo-body h2 { border-color: #ddd; }
  .memo-meta-label { color: #888; }
  .memo-meta-value { color: #111; }
  .memo-doc-type { color: #b45309; }
  .verdict-pill { border-width: 1.5px; }
}

@media (max-width: 600px) {
  .header-bar { padding: 0.75rem 1.25rem; }
  .logo-tag { display: none; }
  .memo-screen { padding: 1.5rem 1rem 4rem; }
  .memo-company-name { font-size: 2rem; }
  .memo-meta { gap: 1rem; }
}
</style>
</head>
<body>
<div class="app">
  <header class="header-bar">
    <div class="logo">
      <div class="logo-mark">DL</div>
      <span class="logo-text">DealLens</span>
      <span class="logo-tag">Investment Memo</span>
    </div>
    <div class="header-actions">
      <a class="btn-header" href="/app.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>
        Back
      </a>
      <button class="btn-header primary" id="btnExport" style="display:none" onclick="window.print()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export PDF
      </button>
    </div>
  </header>

  <!-- Loading -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-ring"></div>
    <div class="loading-label">Generating memo…</div>
    <div class="loading-sub">Claude is writing your investment memo</div>
  </div>

  <!-- Error -->
  <div class="error-screen" id="errorScreen">
    <div class="error-title">Something went wrong</div>
    <div class="error-msg" id="errorMsg">Could not generate the memo. Make sure the server is running and try again.</div>
    <a class="btn-header" href="/app.html" style="margin-top:1rem">Go back</a>
  </div>

  <!-- Memo -->
  <div class="memo-screen" id="memoScreen">
    <div class="memo-cover" id="memoCover"></div>
    <div class="memo-body" id="memoBody"></div>
  </div>
</div>

<script>
async function init() {
  const raw = localStorage.getItem('dl_snapshot');
  if (!raw) {
    showError('No deal snapshot found. Go back and analyze a pitch deck first.');
    return;
  }

  let snapshot;
  try { snapshot = JSON.parse(raw); }
  catch { showError('Invalid snapshot data. Go back and try again.'); return; }

  renderCover(snapshot);

  try {
    const res = await fetch('/generate-memo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(snapshot),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Server error ${res.status}`);
    }
    const { html } = await res.json();
    document.getElementById('memoBody').innerHTML = html;
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('memoScreen').classList.add('visible');
    document.getElementById('btnExport').style.display = '';
  } catch (err) {
    showError(err.message);
  }
}

function renderCover(s) {
  const vc = (s.verdict || '').toLowerCase();
  const vClass = vc.includes('pass') ? 'verdict-pass' : vc.includes('explore') ? 'verdict-explore' : 'verdict-fast';
  const date = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  document.getElementById('memoCover').innerHTML = `
    <div class="memo-doc-type">Investment Memo · Confidential</div>
    <div class="memo-company-name">${esc(s.companyName || '—')}</div>
    <div class="memo-one-liner">${esc(s.oneLiner || '')}</div>
    <div class="memo-meta">
      ${s.stage ? `<div class="memo-meta-item"><div class="memo-meta-label">Stage</div><div class="memo-meta-value">${esc(s.stage)}</div></div>` : ''}
      ${s.financials?.raising ? `<div class="memo-meta-item"><div class="memo-meta-label">Raising</div><div class="memo-meta-value">${esc(s.financials.raising)}</div></div>` : ''}
      ${s.financials?.valuation ? `<div class="memo-meta-item"><div class="memo-meta-label">Valuation</div><div class="memo-meta-value">${esc(s.financials.valuation)}</div></div>` : ''}
      ${s.sector ? `<div class="memo-meta-item"><div class="memo-meta-label">Sector</div><div class="memo-meta-value">${esc(s.sector)}</div></div>` : ''}
      <div class="memo-meta-item"><div class="memo-meta-label">Date</div><div class="memo-meta-value">${date}</div></div>
      ${s.verdict ? `<div class="memo-meta-item"><div class="memo-meta-label">Verdict</div><div class="memo-meta-value"><span class="verdict-pill ${vClass}">${esc(s.verdict)}</span></div></div>` : ''}
    </div>`;
}

function showError(msg) {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorScreen').classList.add('visible');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

init();
</script>
</body>
</html>
